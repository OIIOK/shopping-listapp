<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
      outline: none; /* 마우스 포커스 시 기본 outline 제거 */
    }

    .input-row input:focus-visible {
      outline: 2px solid #4f8ef7;
      outline-offset: 2px;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a7ae0;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: #4f8ef7;
      background: #4f8ef7;
      color: #fff;
    }

    .stats {
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 16px;
    }

    .stats span {
      color: #4f8ef7;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f8faff;
      border: 1.5px solid #e8eef8;
      transition: opacity 0.2s, background 0.2s;
    }

    .item.checked {
      background: #f4f4f4;
      border-color: #e0e0e0;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-word;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e05555;
      background: #fff0f0;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: #fff;
      color: #e05555;
      border: 1.5px solid #f5c0c0;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 살 것들을 기록하세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미구매</button>
      <button class="filter-btn" onclick="setFilter('done', this)">구매완료</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul id="list"></ul>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      stats.innerHTML = total === 0
        ? '아직 아이템이 없습니다'
        : `총 <span>${total}</span>개 중 <span>${done}</span>개 완료`;

      clearBtn.disabled = done === 0;

      const filtered = items.filter(item => {
        if (filter === 'active') return !item.checked;
        if (filter === 'done') return item.checked;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<li class="empty">${
          filter === 'done' ? '완료된 항목이 없습니다' :
          filter === 'active' ? '모든 항목을 완료했습니다 🎉' :
          '아이템을 추가해 보세요'
        }</li>`;
        return;
      }

      list.innerHTML = filtered.map(item => `
        <li class="item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      items.push({ id: Date.now(), text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.checked = !item.checked; save(); render(); }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
