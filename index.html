<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 24px;
    }

    .error-msg {
      background: #fff3f3;
      border: 1px solid #f5c0c0;
      border-radius: 8px;
      color: #e05555;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
      outline: none;
    }

    .input-row input:focus-visible {
      outline: 2px solid #4f8ef7;
      outline-offset: 2px;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a7ae0;
    }

    .input-row button:disabled {
      background: #a0c0f8;
      cursor: default;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }

    .filter-btn.active {
      border-color: #4f8ef7;
      background: #4f8ef7;
      color: #fff;
    }

    .stats {
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 16px;
    }

    .stats span {
      color: #4f8ef7;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f8faff;
      border: 1.5px solid #e8eef8;
      transition: opacity 0.2s, background 0.2s;
    }

    .item.checked {
      background: #f4f4f4;
      border-color: #e0e0e0;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-word;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e05555;
      background: #fff0f0;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: #fff;
      color: #e05555;
      border: 1.5px solid #f5c0c0;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">오늘 살 것들을 기록하세요</p>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미구매</button>
      <button class="filter-btn" onclick="setFilter('done', this)">구매완료</button>
    </div>

    <p class="stats" id="stats"></p>

    <ul id="list"></ul>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()">완료 항목 삭제</button>
  </div>

  <script>
    // ── Supabase 초기화 ──────────────────────────────────────────
    const SUPABASE_URL = 'https://ujsxmncecwgkplcckhoy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqc3htbmNlY3dna3BsY2NraG95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MzQ2MzEsImV4cCI6MjA4ODAxMDYzMX0.SIel5rGy0nWjlzHxT0hgN0-_QkMrc8jxobYXNOvDHiE';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── 상태 ────────────────────────────────────────────────────
    let items  = [];
    let filter = 'all';
    let busy   = false;

    // ── 에러 표시 ────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // ── UI 렌더링 ────────────────────────────────────────────────
    function render() {
      const list     = document.getElementById('list');
      const stats    = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      const total = items.length;
      const done  = items.filter(i => i.checked).length;
      stats.innerHTML = total === 0
        ? '아직 아이템이 없습니다'
        : `총 <span>${total}</span>개 중 <span>${done}</span>개 완료`;

      clearBtn.disabled = done === 0;

      const filtered = items.filter(item => {
        if (filter === 'active') return !item.checked;
        if (filter === 'done')   return item.checked;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<li class="empty">${
          filter === 'done'   ? '완료된 항목이 없습니다' :
          filter === 'active' ? '모든 항목을 완료했습니다 🎉' :
                                '아이템을 추가해 보세요'
        }</li>`;
        return;
      }

      // UUID는 문자열이므로 따옴표로 감싸서 인라인 핸들러에 전달
      list.innerHTML = filtered.map(item => `
        <li class="item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem('${item.id}', this.checked)">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
        </li>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    // ── DB: 전체 로드 ────────────────────────────────────────────
    async function loadItems() {
      document.getElementById('list').innerHTML = '<li class="loading">불러오는 중...</li>';

      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) { showError('데이터를 불러오지 못했습니다: ' + error.message); return; }
      items = data;
      render();
    }

    // ── DB: 아이템 추가 ──────────────────────────────────────────
    async function addItem() {
      if (busy) return;
      const input = document.getElementById('itemInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }

      busy = true;
      document.getElementById('addBtn').disabled = true;

      const { data, error } = await db
        .from('shopping_items')
        .insert([{ text, checked: false }])
        .select()
        .single();

      busy = false;
      document.getElementById('addBtn').disabled = false;

      if (error) { showError('추가 실패: ' + error.message); return; }
      items.push(data);
      input.value = '';
      input.focus();
      render();
    }

    // ── DB: 체크 토글 ────────────────────────────────────────────
    async function toggleItem(id, checked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);

      if (error) { showError('업데이트 실패: ' + error.message); await loadItems(); return; }
      const item = items.find(i => i.id === id);
      if (item) { item.checked = checked; render(); }
    }

    // ── DB: 아이템 삭제 ──────────────────────────────────────────
    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    // ── DB: 완료 항목 일괄 삭제 ──────────────────────────────────
    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('checked', true);

      if (error) { showError('삭제 실패: ' + error.message); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    // ── 필터 ─────────────────────────────────────────────────────
    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    // ── Enter 키 ─────────────────────────────────────────────────
    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // ── 초기 로드 ─────────────────────────────────────────────────
    loadItems();
  </script>
</body>
</html>
